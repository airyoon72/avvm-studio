<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" name="viewport"/>
  <title>AVVM.studio — Order Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --lime: #d8f233;
      --bg: #050505;
      --card-bg: #0f0f0f;
      --border: rgba(255, 255, 255, 0.12);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg);
      color: #f5f5f5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .order-card {
      width: min(520px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 45px 120px #000;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .status-badge {
      background: rgba(216, 242, 51, 0.12);
      border: 1px solid var(--lime);
      color: var(--lime);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .section-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--lime);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }
    .detail-row span:first-child {
      color: rgba(255, 255, 255, 0.45);
    }
    .detail-row span:last-child {
      font-weight: 600;
    }
    .image-preview-section {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .preview-frame {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(216, 242, 51, 0.28);
      overflow: hidden;
      background: #060606;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
    }
    .preview-frame img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
    }
    .empty-msg {
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      padding: 40px 0;
      text-align: center;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--lime);
      color: #050505;
      font-weight: 900;
      font-size: 13px;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="order-card">
    <div class="header">
      <div class="logo">AVVM.STUDIO</div>
      <div class="status-badge" id="statusLabel">주문 접수 완료</div>
    </div>
    
    <div class="section-title">주문 정보 (Order Details)</div>
    <div class="detail-row">
      <span>주문 ID (Order ID)</span>
      <span id="orderId">-</span>
    </div>
    <div class="detail-row">
      <span>성함 / 브랜드명</span>
      <span id="brandName">-</span>
    </div>
    <div class="detail-row">
      <span>이메일 주소</span>
      <span id="emailAddress">-</span>
    </div>
    <div class="detail-row">
      <span>휴대폰 번호</span>
      <span id="phoneNumber">-</span>
    </div>
    <div class="detail-row">
      <span>선택 플랜 (Plan)</span>
      <span id="planName">-</span>
    </div>
    <div class="detail-row">
      <span>결제 가격 (Price)</span>
      <span id="priceVal">-</span>
    </div>
    <div class="detail-row">
      <span>비디오 스타일 (Style)</span>
      <span id="styleName">-</span>
    </div>
    <div class="detail-row">
      <span>화면 비율 (Aspect Ratio)</span>
      <span id="aspectVal">-</span>
    </div>
    <div class="detail-row">
      <span>비디오 화질 (Resolution)</span>
      <span id="resVal">-</span>
    </div>
    
    <div class="image-preview-section">
      <div class="section-title">첨부된 제작 사진 (Uploaded Photo)</div>
      <div class="preview-frame" id="imageFrame">
        <div class="empty-msg" id="emptyMsg">첨부된 이미지가 없습니다.</div>
        <img id="orderImg" style="display: none;" alt="Uploaded Photo"/>
      </div>
    </div>
    <div class="video-preview-section" id="videoPreviewSection" style="display: none; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border);">
      <div class="section-title">제작된 AI 비디오 (Generated AI Video)</div>
      <div id="videoContainer" style="margin-top: 10px; border-radius: 12px; border: 1px solid rgba(216, 242, 51, 0.28); overflow: hidden; background: #060606; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 18px; text-align: center;">
      </div>
    </div>
    
    <a href="index.html" class="btn" style="margin-top: 28px;">홈페이지로 돌아가기</a>
  </div>

  <script>
    (function() {
      const apiBase = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.endsWith('.lhr.life')) 
        ? 'https://avvm.studio' 
        : '';
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('t');
      if (!token) return;

      const orderData = localStorage.getItem('avvmOrder_' + token);
      if (!orderData) return;

      // Inject spinner animation style
      const style = document.createElement('style');
      style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
      document.head.appendChild(style);

      try {
        const order = JSON.parse(orderData);
        document.getElementById('orderId').textContent = order.orderId || '-';
        document.getElementById('brandName').textContent = order.brand || '-';
        document.getElementById('emailAddress').textContent = order.email || '-';
        document.getElementById('phoneNumber').textContent = order.phone || '-';
        document.getElementById('planName').textContent = order.plan || '-';
        document.getElementById('priceVal').textContent = order.price || '-';
        document.getElementById('styleName').textContent = order.category || '-';
        document.getElementById('aspectVal').textContent = order.aspectRatio || '-';
        document.getElementById('resVal').textContent = order.resolution || '-';

        const statusLabel = document.getElementById('statusLabel');
        if (order.statusKo) {
          statusLabel.textContent = order.statusKo;
        }

        if (order.imageData) {
          document.getElementById('emptyMsg').style.display = 'none';
          const img = document.getElementById('orderImg');
          img.src = order.imageData;
          img.style.display = 'block';
        }

        const videoSection = document.getElementById('videoPreviewSection');
        const videoContainer = document.getElementById('videoContainer');

        if (order.requestId) {
          videoSection.style.display = 'block';
          
          if (order.videoUrl) {
            renderVideo(order.videoUrl);
          } else {
            startPollingVideo(order.requestId, token);
          }
        }

        function renderVideo(url) {
          videoContainer.innerHTML = `
            <video src="${url}" controls autoplay loop playsinline style="width:100%; border-radius:8px; border:1px solid var(--lime); box-shadow:0 0 15px rgba(216,242,51,0.22); background:#000; max-height:260px; object-fit:cover;"></video>
          `;
          statusLabel.textContent = '제작 완료';
          statusLabel.style.background = 'rgba(216, 242, 51, 0.12)';
          statusLabel.style.borderColor = 'var(--lime)';
          statusLabel.style.color = 'var(--lime)';
        }

        function startPollingVideo(requestId, orderToken) {
          videoContainer.innerHTML = `
            <div style="font-size:12px; font-weight:800; color:var(--lime); margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:6px;">
              <span class="spinner" style="display:inline-block; width:12px; height:12px; border:2px solid var(--lime); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></span>
              AI 비디오 생성 중...
            </div>
            <div style="width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; margin:10px 0;">
              <div id="videoProgressBar" style="width:5%; height:100%; background:var(--lime); transition:width 0.4s ease; border-radius:999px;"></div>
            </div>
            <div id="videoProgressLabel" style="font-size:11px; color:rgba(255,255,255,0.6)">서버 대기열 조회 중...</div>
          `;

          const interval = setInterval(async () => {
            const pollController = new AbortController();
            const pollTimeoutId = setTimeout(() => pollController.abort(), 5000);
            try {
              const res = await fetch(apiBase + `/api/generate-video?id=${requestId}`, { signal: pollController.signal });
              clearTimeout(pollTimeoutId);
              if (!res.ok) throw new Error("Status query failed");
              const statusData = await res.json();
              
              const bar = document.getElementById('videoProgressBar');
              const label = document.getElementById('videoProgressLabel');
              const status = statusData.status;

              const currentOrder = JSON.parse(localStorage.getItem('avvmOrder_' + orderToken) || '{}');

              if (status === 'IN_QUEUE') {
                if (bar) bar.style.width = '15%';
                if (label) label.textContent = `대기열 진입 중 (대기번호: ${statusData.queue_position || 1})`;
              } else if (status === 'IN_PROGRESS') {
                const pct = Math.max(20, Math.min(95, Math.round((statusData.progress || 0) * 100)));
                if (bar) bar.style.width = `${pct}%`;
                if (label) label.textContent = `영상 프레임 렌더링 중... ${pct}%`;
                statusLabel.textContent = '영상 제작 중';
              } else if (status === 'COMPLETED') {
                clearInterval(interval);
                const videoUrl = statusData.output && statusData.output[0];
                if (videoUrl) {
                  currentOrder.videoUrl = videoUrl;
                  currentOrder.status = 'completed';
                  currentOrder.statusKo = '제작 완료';
                  localStorage.setItem('avvmOrder_' + orderToken, JSON.stringify(currentOrder));
                  renderVideo(videoUrl);
                } else {
                  if (label) label.textContent = '영상 파일 경로를 찾을 수 없습니다.';
                }
              } else if (status === 'FAILED') {
                clearInterval(interval);
                currentOrder.status = 'failed';
                currentOrder.statusKo = '제작 실패';
                localStorage.setItem('avvmOrder_' + orderToken, JSON.stringify(currentOrder));
                
                statusLabel.textContent = '제작 실패';
                statusLabel.style.background = 'rgba(255, 77, 77, 0.12)';
                statusLabel.style.borderColor = '#ff4d4d';
                statusLabel.style.color = '#ff4d4d';

                videoContainer.innerHTML = `
                  <div style="font-size:12px; font-weight:800; color:#ff4d4d; margin-bottom:4px;">✗ AI 영상 생성 실패</div>
                  <div style="font-size:11px; color:rgba(255,255,255,0.6)">API 처리 중 오류가 발생했습니다. 다시 접수해 주세요.</div>
                `;
              }
            } catch (e) {
              clearTimeout(pollTimeoutId);
              console.error("Polling error on details page:", e);
            }
          }, 3000);
        }

      } catch (e) {
        console.error('Error parsing order data:', e);
      }
    })();
  </script>
</body>
</html>
